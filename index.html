<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel-bg: #16213e;
            --gold: #f0c040;
            --text: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-wrapper {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        .side-panel {
            background: var(--panel-bg);
            border: 2px solid #2a3a5e;
            border-radius: 12px;
            padding: 24px 20px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 180px;
            justify-content: flex-start;
        }

        .side-panel h2 {
            font-size: 1.4em;
            color: var(--gold);
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 2px solid #2a3a5e;
            padding-bottom: 12px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
        }

        .stat-label {
            color: #a0a0b0;
        }

        .stat-value {
            color: #fff;
            font-weight: bold;
            font-size: 1.3em;
        }

        .stat-value.kills {
            color: #ff6b6b;
        }

        .stat-value.level {
            color: #4ecdc4;
        }

        .lives-display {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .life-icon {
            width: 20px;
            height: 20px;
            background: #4ecdc4;
            clip-path: polygon(50% 0%, 61% 15%, 75% 15%, 85% 28%, 100% 42%, 100% 65%, 50% 100%, 0% 65%, 0% 42%, 15% 28%, 25% 15%, 39% 15%);
        }

        .life-icon.lost {
            background: #444;
        }

        .controls-info {
            background: #0f0f23;
            border-radius: 8px;
            padding: 16px;
            font-size: 0.85em;
            color: #888;
            line-height: 1.8;
        }

        .controls-info kbd {
            background: #2a3a5e;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9em;
            border: 1px solid #4a5a7e;
        }

        .game-container {
            position: relative;
            border: 3px solid #4a5a7e;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.15), 0 0 60px rgba(0, 0, 0, 0.5);
            line-height: 0;
        }

        canvas {
            display: block;
            border-radius: 2px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .overlay-message {
            background: rgba(0, 0, 0, 0.85);
            color: #f0c040;
            font-size: 2em;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 12px;
            letter-spacing: 3px;
            text-align: center;
            border: 2px solid #f0c040;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%,
            100% {
                text-shadow: 0 0 10px #f0c040;
            }
            50% {
                text-shadow: 0 0 30px #f0c040, 0 0 50px #ff6b6b;
            }
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1000px) {
            .game-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .side-panel {
                flex-direction: row;
                flex-wrap: wrap;
                min-width: auto;
                gap: 12px;
                padding: 12px 16px;
                justify-content: center;
            }
            .side-panel h2 {
                font-size: 1em;
                border-bottom: none;
                padding-bottom: 0;
                margin-right: 10px;
            }
            .stat-item {
                font-size: 0.9em;
                gap: 8px;
            }
            .controls-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- Left Panel -->
        <div class="side-panel">
            <h2>🎮 坦 克 大 战</h2>
            <div class="stat-item">
                <span class="stat-label">🏆 得分</span>
                <span class="stat-value kills" id="scoreDisplay">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🎯 关卡</span>
                <span class="stat-value level" id="levelDisplay">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💀 击杀</span>
                <span class="stat-value" id="killsDisplay">0</span>
            </div>
            <div>
                <div class="stat-label" style="margin-bottom:8px;">❤️ 生命</div>
                <div class="lives-display" id="livesDisplay"></div>
            </div>
            <div class="controls-info">
                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 移动<br>
                <kbd>Space</kbd> 发射子弹<br>
                <kbd>P</kbd> 暂停 / 继续<br>
                <kbd>R</kbd> 重新开始
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-container" id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div class="overlay hidden" id="overlay">
                <div class="overlay-message" id="overlayMessage"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== DOM Elements ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('overlay');
            const overlayMessage = document.getElementById('overlayMessage');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const levelDisplay = document.getElementById('levelDisplay');
            const killsDisplay = document.getElementById('killsDisplay');
            const livesDisplay = document.getElementById('livesDisplay');

            // ==================== Game Constants ====================
            const TILE_SIZE = 32;
            const MAP_COLS = 20;
            const MAP_ROWS = 18;
            const CANVAS_WIDTH = MAP_COLS * TILE_SIZE; // 640
            const CANVAS_HEIGHT = MAP_ROWS * TILE_SIZE; // 576

            const TILE = {
                EMPTY: 0,
                BRICK: 1,
                STEEL: 2,
                WATER: 3,
                BASE: 4,
            };

            const DIR = {
                UP: 0,
                RIGHT: 1,
                DOWN: 2,
                LEFT: 3,
            };

            const TANK_SPEED = 2;
            const BULLET_SPEED = 4;
            const ENEMY_SPEED = 1.2;
            const PLAYER_FIRE_COOLDOWN = 30; // frames
            const ENEMY_FIRE_COOLDOWN_BASE = 80;
            const INVINCIBLE_FRAMES = 90; // 1.5 seconds of invincibility after spawn
            const ENEMY_SPAWN_INTERVAL = 180; // frames between enemy spawns
            const MAX_ACTIVE_ENEMIES = 4;
            const ENEMIES_PER_LEVEL = 12;

            // ==================== Canvas Setup ====================
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;

            // ==================== Game State ====================
            let gameState = 'waiting'; // waiting | playing | paused | gameover | levelcomplete
            let score = 0;
            let level = 1;
            let kills = 0;
            let lives = 3;
            let player = null;
            let enemies = [];
            let bullets = [];
            let particles = [];
            let map = [];
            let baseAlive = true;
            let playerFireCooldown = 0;
            let enemySpawnTimer = 0;
            let enemiesSpawned = 0;
            let frameCount = 0;
            let shakeAmount = 0;
            let shakeDuration = 0;

            // ==================== Input Handling ====================
            const keys = {};
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if (e.code === 'KeyP') {
                    if (gameState === 'playing') {
                        gameState = 'paused';
                        showOverlay('⏸ 暂停中...');
                    } else if (gameState === 'paused') {
                        gameState = 'playing';
                        hideOverlay();
                    }
                }
                if (e.code === 'KeyR') {
                    restartGame();
                }
                if (e.code === 'Space' && gameState === 'waiting') {
                    startGame();
                }
                if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' ||
                    e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                    e.preventDefault();
                }
            });
            window.addEventListener('keyup', e => {
                keys[e.code] = false;
            });

            // ==================== Level Maps ====================
            function generateMap(levelNum) {
                const m = Array.from({ length: MAP_ROWS }, () =>
                    Array.from({ length: MAP_COLS }, () => TILE.EMPTY)
                );

                // Border walls (steel on edges)
                for (let row = 0; row < MAP_ROWS; row++) {
                    m[row][0] = TILE.STEEL;
                    m[row][MAP_COLS - 1] = TILE.STEEL;
                }
                for (let col = 0; col < MAP_COLS; col++) {
                    m[0][col] = TILE.STEEL;
                    m[MAP_ROWS - 1][col] = TILE.STEEL;
                }

                // Base (eagle) at bottom center - protected by bricks
                const baseCol = Math.floor(MAP_COLS / 2);
                m[MAP_ROWS - 2][baseCol - 1] = TILE.BRICK;
                m[MAP_ROWS - 2][baseCol] = TILE.BASE;
                m[MAP_ROWS - 2][baseCol + 1] = TILE.BRICK;
                m[MAP_ROWS - 3][baseCol - 1] = TILE.BRICK;
                m[MAP_ROWS - 3][baseCol] = TILE.BRICK;
                m[MAP_ROWS - 3][baseCol + 1] = TILE.BRICK;

                // Keep player/enemy spawn areas clear
                const clearZones = [
                    { row: MAP_ROWS - 3, col: baseCol - 2 }, { row: MAP_ROWS - 3, col: baseCol + 2 },
                    { row: MAP_ROWS - 2, col: baseCol - 2 }, { row: MAP_ROWS - 2, col: baseCol + 2 },
                    { row: MAP_ROWS - 2, col: baseCol - 3 }, { row: MAP_ROWS - 2, col: baseCol + 3 },
                    { row: MAP_ROWS - 1, col: 4 }, { row: MAP_ROWS - 1, col: 5 }, { row: MAP_ROWS - 1, col: MAP_COLS -
                            5 }, { row: MAP_ROWS - 1, col: MAP_COLS - 6 },
                    { row: 1, col: 1 }, { row: 1, col: 2 }, { row: 1, col: MAP_COLS - 2 }, { row: 1, col: MAP_COLS - 3 },
                    { row: 2, col: 1 }, { row: 2, col: MAP_COLS - 2 },
                ];

                // Generate brick patterns based on level
                const brickDensity = Math.min(0.35, 0.2 + levelNum * 0.02);
                const steelDensity = Math.min(0.06, levelNum * 0.01);

                for (let row = 2; row < MAP_ROWS - 3; row++) {
                    for (let col = 1; col < MAP_COLS - 1; col++) {
                        const isClear = clearZones.some(z => z.row === row && z.col === col);
                        if (isClear) continue;

                        const rand = Math.random();
                        if (rand < steelDensity) {
                            m[row][col] = TILE.STEEL;
                        } else if (rand < brickDensity + steelDensity) {
                            m[row][col] = TILE.BRICK;
                        }
                    }
                }

                // Add some structured walls for visual interest
                const structures = getStructures(levelNum);
                for (const s of structures) {
                    const isClear = clearZones.some(z =>
                        z.row >= s.row && z.row < s.row + s.height &&
                        z.col >= s.col && z.col < s.col + s.width
                    );
                    if (isClear) continue;
                    const tile = s.type || TILE.BRICK;
                    for (let r = s.row; r < Math.min(s.row + s.height, MAP_ROWS - 2); r++) {
                        for (let c = s.col; c < Math.min(s.col + s.width, MAP_COLS - 1); c++) {
                            if (r >= 1 && c >= 1 && r < MAP_ROWS - 1 && c < MAP_COLS - 1) {
                                m[r][c] = tile;
                            }
                        }
                    }
                }

                return m;
            }

            function getStructures(levelNum) {
                const structures = [
                    // Some brick clusters
                    { row: 4, col: 3, width: 3, height: 2, type: TILE.BRICK },
                    { row: 4, col: MAP_COLS - 6, width: 3, height: 2, type: TILE.BRICK },
                    { row: 7, col: Math.floor(MAP_COLS / 2) - 2, width: 4, height: 1, type: TILE.BRICK },
                    { row: 10, col: 4, width: 1, height: 3, type: TILE.BRICK },
                    { row: 10, col: MAP_COLS - 5, width: 1, height: 3, type: TILE.BRICK },
                    { row: 13, col: Math.floor(MAP_COLS / 2) - 3, width: 6, height: 1, type: TILE.BRICK },
                ];

                if (levelNum >= 2) {
                    structures.push(
                        { row: 5, col: Math.floor(MAP_COLS / 2) - 1, width: 2, height: 1, type: TILE.STEEL },
                        { row: 9, col: 7, width: 2, height: 2, type: TILE.STEEL },
                        { row: 9, col: MAP_COLS - 9, width: 2, height: 2, type: TILE.STEEL },
                    );
                }
                if (levelNum >= 3) {
                    structures.push(
                        { row: 3, col: 8, width: 1, height: 2, type: TILE.STEEL },
                        { row: 3, col: MAP_COLS - 9, width: 1, height: 2, type: TILE.STEEL },
                        { row: 12, col: 3, width: 2, height: 1, type: TILE.STEEL },
                        { row: 12, col: MAP_COLS - 5, width: 2, height: 1, type: TILE.STEEL },
                    );
                }

                return structures;
            }

            // ==================== Tank Class ====================
            class Tank {
                constructor(x, y, dir, color, isPlayer = false) {
                    this.x = x;
                    this.y = y;
                    this.dir = dir;
                    this.color = color;
                    this.isPlayer = isPlayer;
                    this.speed = isPlayer ? TANK_SPEED : ENEMY_SPEED;
                    this.width = TILE_SIZE - 4;
                    this.height = TILE_SIZE - 4;
                    this.fireCooldown = 0;
                    this.alive = true;
                    this.invincible = isPlayer ? INVINCIBLE_FRAMES : 0;
                    this.flashTimer = 0;
                    this.aiDirChangeTimer = 40 + Math.floor(Math.random() * 60);
                    this.aiShootTimer = 30 + Math.floor(Math.random() * 50);
                    this.bodyAngle = 0;
                }

                getCenterX() { return this.x + this.width / 2; }
                getCenterY() { return this.y + this.height / 2; }

                getBounds() {
                    return {
                        x: this.x,
                        y: this.y,
                        width: this.width,
                        height: this.height,
                    };
                }

                collidesWithMap(dx, dy) {
                    const newX = this.x + dx;
                    const newY = this.y + dy;
                    const bounds = {
                        x: newX,
                        y: newY,
                        width: this.width,
                        height: this.height,
                    };
                    return collidesWithWalls(bounds);
                }

                collidesWithTank(other, dx, dy) {
                    const newX = this.x + (dx || 0);
                    const newY = this.y + (dy || 0);
                    return rectsOverlap(
                        { x: newX, y: newY, width: this.width, height: this.height },
                        other.getBounds()
                    );
                }

                move(dx, dy) {
                    if (!this.collidesWithMap(dx, dy)) {
                        // Check collision with other tanks
                        const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this &&
                            e.alive)];
                        const allFiltered = allTanks.filter(t => t && t.alive && t !== this);

                        let blocked = false;
                        for (const other of allFiltered) {
                            if (this.collidesWithTank(other, dx, dy)) {
                                blocked = true;
                                break;
                            }
                        }
                        if (!blocked) {
                            this.x += dx;
                            this.y += dy;
                            // Clamp to map bounds
                            this.x = Math.max(TILE_SIZE, Math.min(this.x, CANVAS_WIDTH - TILE_SIZE - this.width));
                            this.y = Math.max(TILE_SIZE, Math.min(this.y, CANVAS_HEIGHT - TILE_SIZE - this.height));
                            return true;
                        }
                    }
                    return false;
                }

                moveForward() {
                    switch (this.dir) {
                        case DIR.UP:
                            return this.move(0, -this.speed);
                        case DIR.DOWN:
                            return this.move(0, this.speed);
                        case DIR.LEFT:
                            return this.move(-this.speed, 0);
                        case DIR.RIGHT:
                            return this.move(this.speed, 0);
                    }
                    return false;
                }

                shoot() {
                    if (this.fireCooldown > 0) return null;
                    const cx = this.getCenterX();
                    const cy = this.getCenterY();
                    const bulletW = 5;
                    const bulletH = 5;
                    let bx, by;
                    switch (this.dir) {
                        case DIR.UP:
                            bx = cx - bulletW / 2;
                            by = this.y - bulletH;
                            break;
                        case DIR.DOWN:
                            bx = cx - bulletW / 2;
                            by = this.y + this.height;
                            break;
                        case DIR.LEFT:
                            bx = this.x - bulletH;
                            by = cy - bulletW / 2;
                            break;
                        case DIR.RIGHT:
                            bx = this.x + this.width;
                            by = cy - bulletW / 2;
                            break;
                    }
                    this.fireCooldown = this.isPlayer ? PLAYER_FIRE_COOLDOWN : ENEMY_FIRE_COOLDOWN_BASE +
                        Math.floor(Math.random() * 40);
                    return new Bullet(bx, by, this.dir, this.isPlayer);
                }

                update() {
                    if (this.fireCooldown > 0) this.fireCooldown--;
                    if (this.invincible > 0) this.invincible--;
                    if (this.flashTimer > 0) this.flashTimer--;
                }

                draw(ctx) {
                    if (!this.alive) return;

                    // Invincibility flash
                    if (this.invincible > 0 && Math.floor(this.invincible / 6) % 2 === 0) {
                        ctx.globalAlpha = 0.5;
                    }

                    const cx = this.getCenterX();
                    const cy = this.getCenterY();
                    const hw = this.width / 2;
                    const hh = this.height / 2;

                    ctx.save();
                    ctx.translate(cx, cy);

                    // Rotate based on direction
                    const angles = [-Math.PI / 2, 0, Math.PI / 2, Math.PI]; // UP, RIGHT, DOWN, LEFT
                    ctx.rotate(angles[this.dir]);

                    // Tank body
                    const bodyColor = this.color;
                    const darkColor = darkenColor(bodyColor, 0.4);
                    const lightColor = lightenColor(bodyColor, 0.3);

                    // Tracks
                    ctx.fillStyle = darkColor;
                    ctx.fillRect(-hw, -hh, hw * 0.3, hh * 2);
                    ctx.fillRect(hw * 0.7, -hh, hw * 0.3, hh * 2);

                    // Track treads
                    ctx.fillStyle = '#1a1a1a';
                    for (let i = -3; i <= 3; i++) {
                        ctx.fillRect(-hw + 1, i * (hh / 3.5) - 1.5, hw * 0.3 - 2, 3);
                        ctx.fillRect(hw * 0.7 + 1, i * (hh / 3.5) - 1.5, hw * 0.3 - 2, 3);
                    }

                    // Main body
                    const bodyGrad = ctx.createLinearGradient(0, -hh, 0, hh);
                    bodyGrad.addColorStop(0, lightColor);
                    bodyGrad.addColorStop(0.5, bodyColor);
                    bodyGrad.addColorStop(1, darkColor);
                    ctx.fillStyle = bodyGrad;
                    ctx.fillRect(-hw * 0.65, -hh * 0.85, hw * 1.3, hh * 1.7);

                    // Body border
                    ctx.strokeStyle = darkColor;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(-hw * 0.65, -hh * 0.85, hw * 1.3, hh * 1.7);

                    // Turret base (circle)
                    ctx.fillStyle = darkColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, hw * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = bodyColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, hw * 0.3, 0, Math.PI * 2);
                    ctx.fill();

                    // Barrel
                    ctx.fillStyle = darkColor;
                    ctx.fillRect(-3, -hh * 1.0, 6, hh * 0.8);
                    ctx.fillStyle = lightColor;
                    ctx.fillRect(-2, -hh * 1.0, 4, hh * 0.8);

                    // Barrel tip
                    ctx.fillStyle = bodyColor;
                    ctx.fillRect(-2, -hh * 1.05, 4, 6);

                    ctx.restore();

                    // Shield indicator for invincible tanks
                    if (this.invincible > 0) {
                        ctx.globalAlpha = 0.3 + 0.2 * Math.sin(frameCount * 0.3);
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(cx, cy, Math.max(hw, hh) + 5, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }

            // ==================== Bullet Class ====================
            class Bullet {
                constructor(x, y, dir, isPlayer) {
                    this.x = x;
                    this.y = y;
                    this.dir = dir;
                    this.isPlayer = isPlayer;
                    this.speed = BULLET_SPEED;
                    this.alive = true;
                    this.width = 5;
                    this.height = 5;
                }

                getBounds() {
                    return { x: this.x, y: this.y, width: this.width, height: this.height };
                }

                update() {
                    switch (this.dir) {
                        case DIR.UP:
                            this.y -= this.speed;
                            break;
                        case DIR.DOWN:
                            this.y += this.speed;
                            break;
                        case DIR.LEFT:
                            this.x -= this.speed;
                            break;
                        case DIR.RIGHT:
                            this.x += this.speed;
                            break;
                    }

                    // Out of bounds
                    if (this.x < -10 || this.x > CANVAS_WIDTH + 10 ||
                        this.y < -10 || this.y > CANVAS_HEIGHT + 10) {
                        this.alive = false;
                        return;
                    }

                    // Wall collision
                    const bounds = this.getBounds();
                    const tileCol = Math.floor(this.x / TILE_SIZE);
                    const tileRow = Math.floor(this.y / TILE_SIZE);

                    // Check surrounding tiles
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const r = tileRow + dr;
                            const c = tileCol + dc;
                            if (r >= 0 && r < MAP_ROWS && c >= 0 && c < MAP_COLS) {
                                const tile = map[r][c];
                                if (tile === TILE.BRICK || tile === TILE.STEEL || tile === TILE.BASE) {
                                    const tileBounds = {
                                        x: c * TILE_SIZE,
                                        y: r * TILE_SIZE,
                                        width: TILE_SIZE,
                                        height: TILE_SIZE,
                                    };
                                    if (rectsOverlap(bounds, tileBounds)) {
                                        if (tile === TILE.BRICK) {
                                            map[r][c] = TILE.EMPTY;
                                            spawnBrickParticles(c * TILE_SIZE + TILE_SIZE / 2, r * TILE_SIZE +
                                                TILE_SIZE / 2);
                                        }
                                        if (tile === TILE.BASE) {
                                            baseAlive = false;
                                            map[r][c] = TILE.EMPTY;
                                            spawnExplosion(c * TILE_SIZE + TILE_SIZE / 2, r * TILE_SIZE + TILE_SIZE / 2,
                                                '#ff4444', 15);
                                            shakeAmount = 8;
                                            shakeDuration = 20;
                                        }
                                        if (tile === TILE.STEEL && this.isPlayer) {
                                            spawnSteelSpark(c * TILE_SIZE + TILE_SIZE / 2, r * TILE_SIZE + TILE_SIZE /
                                                2);
                                        }
                                        this.alive = false;
                                        return;
                                    }
                                }
                            }
                        }
                    }
                }

                draw(ctx) {
                    if (!this.alive) return;
                    ctx.fillStyle = this.isPlayer ? '#ffe66d' : '#ff6b6b';
                    ctx.shadowColor = this.isPlayer ? '#ffe66d' : '#ff6b6b';
                    ctx.shadowBlur = 6;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.shadowBlur = 0;

                    // Trail
                    ctx.fillStyle = this.isPlayer ? 'rgba(255,230,109,0.4)' : 'rgba(255,107,107,0.4)';
                    const trailLen = 6;
                    switch (this.dir) {
                        case DIR.UP:
                            ctx.fillRect(this.x, this.y + this.height, this.width, trailLen);
                            break;
                        case DIR.DOWN:
                            ctx.fillRect(this.x, this.y - trailLen, this.width, trailLen);
                            break;
                        case DIR.LEFT:
                            ctx.fillRect(this.x + this.width, this.y, trailLen, this.height);
                            break;
                        case DIR.RIGHT:
                            ctx.fillRect(this.x - trailLen, this.y, trailLen, this.height);
                            break;
                    }
                }
            }

            // ==================== Particle System ====================
            function spawnBrickParticles(x, y) {
                const count = 8;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                    const speed = 1.5 + Math.random() * 3;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 15 + Math.floor(Math.random() * 10),
                        maxLife: 25,
                        color: Math.random() < 0.5 ? '#c4956a' : '#a0522d',
                        size: 2 + Math.random() * 3,
                    });
                }
            }

            function spawnSteelSpark(x, y) {
                const count = 5;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 3;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 8 + Math.floor(Math.random() * 6),
                        maxLife: 14,
                        color: '#ffffff',
                        size: 1 + Math.random() * 2,
                    });
                }
            }

            function spawnExplosion(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
                    const speed = 2 + Math.random() * 4;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 20 + Math.floor(Math.random() * 15),
                        maxLife: 35,
                        color: color,
                        size: 2 + Math.random() * 3,
                    });
                }
                // Inner flash particles
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        life: 5 + Math.floor(Math.random() * 5),
                        maxLife: 10,
                        color: '#ffff00',
                        size: 2 + Math.random() * 2,
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = p.life / p.maxLife;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
                }
                ctx.globalAlpha = 1;
            }

            // ==================== Collision Helpers ====================
            function rectsOverlap(a, b) {
                return (
                    a.x < b.x + b.width &&
                    a.x + a.width > b.x &&
                    a.y < b.y + b.height &&
                    a.y + a.height > b.y
                );
            }

            function collidesWithWalls(bounds) {
                const left = Math.floor(bounds.x / TILE_SIZE);
                const right = Math.floor((bounds.x + bounds.width - 0.1) / TILE_SIZE);
                const top = Math.floor(bounds.y / TILE_SIZE);
                const bottom = Math.floor((bounds.y + bounds.height - 0.1) / TILE_SIZE);

                for (let row = top; row <= bottom; row++) {
                    for (let col = left; col <= right; col++) {
                        if (row >= 0 && row < MAP_ROWS && col >= 0 && col < MAP_COLS) {
                            const tile = map[row][col];
                            if (tile === TILE.BRICK || tile === TILE.STEEL || tile === TILE.BASE || tile === TILE
                                .WATER) {
                                return true;
                            }
                        } else {
                            return true; // Out of bounds
                        }
                    }
                }
                return false;
            }

            // ==================== Color Helpers ====================
            function darkenColor(hex, factor) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                const dr = Math.floor(r * (1 - factor));
                const dg = Math.floor(g * (1 - factor));
                const db = Math.floor(b * (1 - factor));
                return `rgb(${dr},${dg},${db})`;
            }

            function lightenColor(hex, factor) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                const lr = Math.min(255, Math.floor(r + (255 - r) * factor));
                const lg = Math.min(255, Math.floor(g + (255 - g) * factor));
                const lb = Math.min(255, Math.floor(b + (255 - b) * factor));
                return `rgb(${lr},${lg},${lb})`;
            }

            // ==================== Enemy AI ====================
            function updateEnemyAI(enemy) {
                if (!enemy.alive) return;

                enemy.aiDirChangeTimer--;
                enemy.aiShootTimer--;

                // Change direction periodically or when blocked
                if (enemy.aiDirChangeTimer <= 0) {
                    // Bias direction toward player or base
                    const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
                    // 40% chance to move toward player, 60% random
                    if (Math.random() < 0.4 && player && player.alive) {
                        const dx = player.getCenterX() - enemy.getCenterX();
                        const dy = player.getCenterY() - enemy.getCenterY();
                        if (Math.abs(dx) > Math.abs(dy)) {
                            enemy.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                        } else {
                            enemy.dir = dy > 0 ? DIR.DOWN : DIR.UP;
                        }
                    } else {
                        enemy.dir = dirs[Math.floor(Math.random() * 4)];
                    }
                    enemy.aiDirChangeTimer = 30 + Math.floor(Math.random() * 90);
                }

                // Try to move forward, if blocked change direction
                if (!enemy.moveForward()) {
                    const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT].filter(d => d !== enemy.dir);
                    enemy.dir = dirs[Math.floor(Math.random() * dirs.length)];
                    enemy.aiDirChangeTimer = 15 + Math.floor(Math.random() * 30);
                }

                // Shooting
                if (enemy.aiShootTimer <= 0) {
                    const bullet = enemy.shoot();
                    if (bullet) bullets.push(bullet);
                    enemy.aiShootTimer = 50 + Math.floor(Math.random() * 80);
                }
            }

            // ==================== Game Logic ====================
            function spawnPlayer() {
                const spawnCol = Math.floor(MAP_COLS / 2);
                const spawnX = spawnCol * TILE_SIZE + (TILE_SIZE - (TILE_SIZE - 4)) / 2;
                const spawnY = (MAP_ROWS - 2) * TILE_SIZE + (TILE_SIZE - (TILE_SIZE - 4)) / 2;
                player = new Tank(spawnX, spawnY, DIR.UP, '#4ecdc4', true);
                player.invincible = INVINCIBLE_FRAMES;
            }

            function spawnEnemy() {
                if (enemiesSpawned >= ENEMIES_PER_LEVEL) return null;
                if (enemies.filter(e => e.alive).length >= MAX_ACTIVE_ENEMIES) return null;

                const spawnPoints = [
                    { col: 1, dir: DIR.DOWN },
                    { col: Math.floor(MAP_COLS / 2), dir: DIR.DOWN },
                    { col: MAP_COLS - 2, dir: DIR.DOWN },
                ];

                const sp = spawnPoints[Math.floor(Math.random() * spawnPoints.length)];
                const x = sp.col * TILE_SIZE + (TILE_SIZE - (TILE_SIZE - 4)) / 2;
                const y = TILE_SIZE + (TILE_SIZE - (TILE_SIZE - 4)) / 2;

                const enemyColors = ['#ff6b6b', '#ffa502', '#ff6348', '#e056a0', '#a29bfe'];
                const color = enemyColors[Math.floor(Math.random() * enemyColors.length)];

                const enemy = new Tank(x, y, sp.dir, color, false);
                enemy.invincible = 30;
                enemies.push(enemy);
                enemiesSpawned++;
                return enemy;
            }

            function checkBulletTankCollisions() {
                for (const bullet of bullets) {
                    if (!bullet.alive) continue;

                    if (bullet.isPlayer) {
                        // Player bullet vs enemies
                        for (const enemy of enemies) {
                            if (!enemy.alive) continue;
                            if (rectsOverlap(bullet.getBounds(), enemy.getBounds())) {
                                bullet.alive = false;
                                enemy.alive = false;
                                spawnExplosion(enemy.getCenterX(), enemy.getCenterY(), enemy.color);
                                score += 100;
                                kills++;
                                updateHUD();
                                break;
                            }
                        }
                    } else {
                        // Enemy bullet vs player
                        if (player && player.alive && player.invincible <= 0) {
                            if (rectsOverlap(bullet.getBounds(), player.getBounds())) {
                                bullet.alive = false;
                                playerHit();
                            }
                        }
                    }
                }
            }

            function checkBulletBulletCollisions() {
                for (let i = 0; i < bullets.length; i++) {
                    for (let j = i + 1; j < bullets.length; j++) {
                        if (bullets[i].alive && bullets[j].alive &&
                            bullets[i].isPlayer !== bullets[j].isPlayer &&
                            rectsOverlap(bullets[i].getBounds(), bullets[j].getBounds())) {
                            bullets[i].alive = false;
                            bullets[j].alive = false;
                            const cx = (bullets[i].x + bullets[j].x) / 2;
                            const cy = (bullets[i].y + bullets[j].y) / 2;
                            spawnSteelSpark(cx, cy);
                        }
                    }
                }
            }

            function playerHit() {
                lives--;
                updateHUD();
                spawnExplosion(player.getCenterX(), player.getCenterY(), '#4ecdc4', 10);
                shakeAmount = 5;
                shakeDuration = 12;
                if (lives <= 0) {
                    player.alive = false;
                    gameOver();
                } else {
                    player.alive = false;
                    // Respawn after a short delay
                    setTimeout(() => {
                        if (gameState === 'playing') {
                            spawnPlayer();
                        }
                    }, 800);
                }
            }

            function gameOver() {
                gameState = 'gameover';
                showOverlay('💥 游戏结束 💥');
            }

            function levelComplete() {
                gameState = 'levelcomplete';
                score += 500; // Level bonus
                updateHUD();
                showOverlay(`🎉 第 ${level} 关 通过！ 🎉`);
                setTimeout(() => {
                    if (gameState === 'levelcomplete') {
                        level++;
                        startLevel();
                    }
                }, 2500);
            }

            function startGame() {
                score = 0;
                level = 1;
                kills = 0;
                lives = 3;
                enemiesSpawned = 0;
                enemies = [];
                bullets = [];
                particles = [];
                startLevel();
                hideOverlay();
            }

            function startLevel() {
                map = generateMap(level);
                enemies = [];
                bullets = [];
                particles = [];
                baseAlive = true;
                enemiesSpawned = 0;
                enemySpawnTimer = 0;
                spawnPlayer();
                gameState = 'playing';
                updateHUD();
                hideOverlay();
                enemySpawnTimer = 60; // First enemy spawns after 1 second
            }

            function restartGame() {
                startGame();
            }

            function updateHUD() {
                scoreDisplay.textContent = score;
                levelDisplay.textContent = level;
                killsDisplay.textContent = kills;

                // Update lives display
                let livesHTML = '';
                for (let i = 0; i < 5; i++) {
                    livesHTML += `<div class="life-icon${i >= lives ? ' lost' : ''}"></div>`;
                }
                livesDisplay.innerHTML = livesHTML;
            }

            function showOverlay(message) {
                overlayMessage.textContent = message;
                overlay.classList.remove('hidden');
            }

            function hideOverlay() {
                overlay.classList.add('hidden');
            }

            // ==================== Rendering ====================
            function drawMap() {
                for (let row = 0; row < MAP_ROWS; row++) {
                    for (let col = 0; col < MAP_COLS; col++) {
                        const tile = map[row][col];
                        const x = col * TILE_SIZE;
                        const y = row * TILE_SIZE;

                        switch (tile) {
                            case TILE.BRICK:
                                ctx.fillStyle = '#c4956a';
                                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                                ctx.fillStyle = '#a0522d';
                                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE / 2);
                                ctx.fillRect(x + TILE_SIZE / 2, y + TILE_SIZE / 2, TILE_SIZE / 2, TILE_SIZE / 2);
                                ctx.strokeStyle = '#8b4513';
                                ctx.lineWidth = 1;
                                ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                                // Brick lines
                                ctx.beginPath();
                                ctx.moveTo(x, y + TILE_SIZE / 2);
                                ctx.lineTo(x + TILE_SIZE, y + TILE_SIZE / 2);
                                ctx.moveTo(x + TILE_SIZE / 2, y);
                                ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE);
                                ctx.strokeStyle = '#8b6914';
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                                break;

                            case TILE.STEEL:
                                ctx.fillStyle = '#7f8c8d';
                                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                                const steelGrad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
                                steelGrad.addColorStop(0, '#bdc3c7');
                                steelGrad.addColorStop(0.3, '#95a5a6');
                                steelGrad.addColorStop(0.7, '#7f8c8d');
                                steelGrad.addColorStop(1, '#636e72');
                                ctx.fillStyle = steelGrad;
                                ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                                ctx.strokeStyle = '#2c3e50';
                                ctx.lineWidth = 2;
                                ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                                // Rivets
                                ctx.fillStyle = '#2c3e50';
                                [
                                    [x + 5, y + 5],
                                    [x + TILE_SIZE - 7, y + 5],
                                    [x + 5, y + TILE_SIZE - 7],
                                    [x + TILE_SIZE - 7, y + TILE_SIZE - 7]
                                ].forEach(([rx, ry]) => {
                                    ctx.beginPath();
                                    ctx.arc(rx, ry, 2, 0, Math.PI * 2);
                                    ctx.fill();
                                });
                                break;

                            case TILE.BASE:
                                // Eagle/base
                                ctx.fillStyle = '#1a1a2e';
                                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                                // Draw eagle
                                ctx.fillStyle = '#f0c040';
                                ctx.beginPath();
                                // Body
                                ctx.moveTo(x + TILE_SIZE / 2, y + TILE_SIZE * 0.2);
                                ctx.lineTo(x + TILE_SIZE * 0.65, y + TILE_SIZE * 0.5);
                                ctx.lineTo(x + TILE_SIZE * 0.8, y + TILE_SIZE * 0.55);
                                ctx.lineTo(x + TILE_SIZE * 0.75, y + TILE_SIZE * 0.85);
                                ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE * 0.9);
                                ctx.lineTo(x + TILE_SIZE * 0.25, y + TILE_SIZE * 0.85);
                                ctx.lineTo(x + TILE_SIZE * 0.2, y + TILE_SIZE * 0.55);
                                ctx.lineTo(x + TILE_SIZE * 0.35, y + TILE_SIZE * 0.5);
                                ctx.closePath();
                                ctx.fill();
                                ctx.strokeStyle = '#d4a017';
                                ctx.lineWidth = 1.5;
                                ctx.stroke();
                                // Wings
                                ctx.fillStyle = '#f0c040';
                                ctx.beginPath();
                                ctx.moveTo(x + TILE_SIZE * 0.3, y + TILE_SIZE * 0.55);
                                ctx.lineTo(x + TILE_SIZE * 0.1, y + TILE_SIZE * 0.4);
                                ctx.lineTo(x + TILE_SIZE * 0.25, y + TILE_SIZE * 0.65);
                                ctx.closePath();
                                ctx.fill();
                                ctx.beginPath();
                                ctx.moveTo(x + TILE_SIZE * 0.7, y + TILE_SIZE * 0.55);
                                ctx.lineTo(x + TILE_SIZE * 0.9, y + TILE_SIZE * 0.4);
                                ctx.lineTo(x + TILE_SIZE * 0.75, y + TILE_SIZE * 0.65);
                                ctx.closePath();
                                ctx.fill();
                                break;

                            case TILE.WATER:
                                ctx.fillStyle = '#3498db';
                                ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                                ctx.fillStyle = '#2980b9';
                                for (let w = 0; w < 3; w++) {
                                    ctx.fillRect(x + w * 12, y + 4, 8, 4);
                                    ctx.fillRect(x + 4 + w * 12, y + 16, 8, 4);
                                    ctx.fillRect(x + w * 12, y + 24, 8, 4);
                                }
                                break;
                        }
                    }
                }
            }

            function drawBackground() {
                // Dark ground
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // Subtle grid
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let x = 0; x < CANVAS_WIDTH; x += TILE_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, CANVAS_HEIGHT);
                    ctx.stroke();
                }
                for (let y = 0; y < CANVAS_HEIGHT; y += TILE_SIZE) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(CANVAS_WIDTH, y);
                    ctx.stroke();
                }
            }

            function drawHUD() {
                // Level indicator on canvas
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.font = 'bold 48px "Segoe UI", "Microsoft YaHei", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`STAGE ${level}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
            }

            function render() {
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // Screen shake
                ctx.save();
                if (shakeDuration > 0) {
                    const sx = (Math.random() - 0.5) * shakeAmount * 2;
                    const sy = (Math.random() - 0.5) * shakeAmount * 2;
                    ctx.translate(sx, sy);
                    shakeDuration--;
                    if (shakeDuration <= 0) shakeAmount = 0;
                }

                drawBackground();
                drawMap();

                // Draw tanks
                if (player && player.alive) player.draw(ctx);
                for (const enemy of enemies) {
                    if (enemy.alive) enemy.draw(ctx);
                }

                // Draw bullets
                for (const bullet of bullets) {
                    if (bullet.alive) bullet.draw(ctx);
                }

                // Draw particles
                drawParticles(ctx);

                ctx.restore();

                // Base warning
                if (baseAlive && enemies.some(e => {
                        const dy = e.y - (MAP_ROWS - 3) * TILE_SIZE;
                        return e.alive && dy > -60;
                    })) {
                    const baseX = Math.floor(MAP_COLS / 2) * TILE_SIZE + TILE_SIZE / 2;
                    const baseY = (MAP_ROWS - 2) * TILE_SIZE + TILE_SIZE / 2;
                    ctx.fillStyle = 'rgba(255,0,0,0.15)';
                    ctx.beginPath();
                    ctx.arc(baseX, baseY, TILE_SIZE * 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 11px "Segoe UI", "Microsoft YaHei", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚠ 基地告警！', baseX, baseY - TILE_SIZE * 2 - 5);
                }
            }

            // ==================== Game Loop ====================
            function update() {
                if (gameState !== 'playing') return;
                frameCount++;

                // Enemy spawning
                enemySpawnTimer--;
                if (enemySpawnTimer <= 0 && enemiesSpawned < ENEMIES_PER_LEVEL) {
                    spawnEnemy();
                    enemySpawnTimer = ENEMY_SPAWN_INTERVAL + Math.floor(Math.random() * 60);
                }

                // Check if all enemies are dead and all spawned
                if (enemiesSpawned >= ENEMIES_PER_LEVEL && enemies.filter(e => e.alive).length === 0) {
                    levelComplete();
                    return;
                }

                // Check if base is destroyed
                if (!baseAlive && gameState === 'playing') {
                    gameOver();
                    return;
                }

                // Update player
                if (player && player.alive) {
                    let moved = false;
                    if (keys['ArrowUp'] || keys['KeyW']) { player.dir = DIR.UP;
                        moved = player.moveForward(); } else if (keys['ArrowDown'] || keys['KeyS']) { player.dir = DIR
                            .DOWN;
                        moved = player.moveForward(); } else if (keys['ArrowLeft'] || keys['KeyA']) { player.dir = DIR
                            .LEFT;
                        moved = player.moveForward(); } else if (keys['ArrowRight'] || keys['KeyD']) { player.dir = DIR
                            .RIGHT;
                        moved = player.moveForward(); }

                    player.update();

                    // Shooting
                    if (keys['Space'] || keys['KeyJ']) {
                        const bullet = player.shoot();
                        if (bullet) bullets.push(bullet);
                    }
                } else if (player && !player.alive) {
                    // Player is dead but game still going (respawning)
                    player.update();
                }

                // Update enemies
                for (const enemy of enemies) {
                    if (enemy.alive) {
                        updateEnemyAI(enemy);
                        enemy.update();
                    }
                }

                // Update bullets
                for (const bullet of bullets) {
                    if (bullet.alive) bullet.update();
                }

                // Collision checks
                checkBulletTankCollisions();
                checkBulletBulletCollisions();

                // Check if player tank collides with enemy tanks
                if (player && player.alive && player.invincible <= 0) {
                    for (const enemy of enemies) {
                        if (enemy.alive && player.collidesWithTank(enemy)) {
                            playerHit();
                            break;
                        }
                    }
                }

                // Cleanup dead bullets
                bullets = bullets.filter(b => b.alive);

                // Update particles
                updateParticles();
            }

            function gameLoop() {
                update();
                render();
                requestAnimationFrame(gameLoop);
            }

            // ==================== Initialization ====================
            function init() {
                map = generateMap(level);
                spawnPlayer();
                updateHUD();
                showOverlay('按 Space 开始游戏');
                gameState = 'waiting';
                render();
                requestAnimationFrame(gameLoop);
            }

            init();

            console.log('🎮 坦克大战准备就绪！');
            console.log('   ↑↓←→ 移动  Space 射击');
            console.log('   P 暂停  R 重新开始');
            console.log('   保护基地 🦅！消灭所有敌人！');
        })();
    </script>
</body>
